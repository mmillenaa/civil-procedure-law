<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulado — Estrutura da Prova (45 questões)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f0f10; color:#e4e4ed;
            font-family:'Cardo',Georgia,serif;
            font-size:17px; line-height:1.5;
            padding:20px 15px;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
        }
        .container {
            max-width:860px; width:100%;
            background:#16161a;
            border:1px solid #2d2d38;
            border-radius:12px;
            padding:20px 20px 30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.7);
        }
        .header {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
            border-bottom:1px solid #2d2d38;
            padding-bottom:12px;
        }
        .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
        .header-info { text-align:right; font-size:13px; color:#9494a1; }
        .header-info strong { color:#d97706; }

        .nav-top {
            display:flex;
            flex-wrap:wrap;
            gap:6px 5px;
            justify-content:center;
            margin:10px 0 16px;
            padding:6px 0;
            border-bottom:1px solid #1f1f26;
        }
        .nav-btn {
            width:32px; height:32px;
            border-radius:4px;
            border:1px solid #333340;
            background:#222227;
            color:#888;
            font-size:12px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            font-family:system-ui, sans-serif;
        }
        .nav-btn:hover { background:#31313d; color:#fff; }
        .nav-btn.active { border-color:#d97706; background:#d97706; color:#fff; box-shadow:0 0 8px #d9770680; }
        .nav-btn.answered-correct { background:#2e7d32; border-color:#2e7d32; color:#fff; opacity:0.8; }
        .nav-btn.answered-wrong { background:#c62828; border-color:#c62828; color:#fff; opacity:0.8; }
        .nav-btn.marked { position:relative; }
        .nav-btn.marked::after {
            content:"⭐";
            position:absolute;
            top:-6px; right:-6px;
            font-size:11px;
            line-height:1;
        }

        .control-bar {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
        }
        .control-bar .counter { font-size:15px; color:#9494a1; }
        .control-bar .actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-small {
            background:#222227; border:1px solid #333340;
            color:#e4e4ed; padding:6px 14px;
            border-radius:6px; font-size:14px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-small:hover { background:#2d2d35; border-color:#555; }
        .btn-small.mark-toggle { color:#fbbf24; }
        .btn-small.mark-toggle.active { background:#3b2f1a; border-color:#fbbf24; }
        .btn-small.shuffle { color:#60a5fa; }

        .question-box {
            background:#1a1a24;
            border-left:4px solid #d97706;
            padding:18px 20px;
            border-radius:6px;
            margin-bottom:18px;
        }
        .question-box .q-tema {
            font-size:13px; color:#d97706;
            font-weight:700; margin-bottom:6px;
        }
        .question-box .q-text {
            font-size:18px; color:#ffffff;
            margin-bottom:12px;
        }
        .options { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
        .option {
            background:#222227; border:1px solid #2d2d38;
            border-radius:6px; padding:12px 14px;
            cursor:pointer; transition:0.2s;
            display:flex; align-items:flex-start;
            gap:10px; font-size:16px;
        }
        .option:hover:not(.disabled) { background:#2b2b33; border-color:#444456; }
        .option input[type="radio"] {
            accent-color:#d97706;
            width:17px; height:17px;
            margin-top:2px; flex-shrink:0;
            cursor:pointer;
        }
        .option.disabled { cursor:default; opacity:0.75; }
        .option.correct { border-color:#4caf50; background:rgba(76,175,80,0.12); color:#a7f3d0; }
        .option.wrong { border-color:#ef4444; background:rgba(239,68,68,0.12); color:#fca5a5; }

        .feedback-box {
            background:#1c1c24;
            border-left:4px solid #d97706;
            padding:14px 16px;
            border-radius:6px;
            margin-top:16px;
            display:none;
            font-size:16px;
            line-height:1.5;
            color:#d1d1d6;
        }
        .feedback-box .fb-title { font-weight:700; margin-bottom:4px; }
        .feedback-box .fb-title.correct { color:#4caf50; }
        .feedback-box .fb-title.wrong { color:#ef4444; }

        .nav-bottom {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-top:20px;
            flex-wrap:wrap;
        }
        .btn-nav {
            background:#222227; border:1px solid #2d2d38;
            color:#e4e4ed; padding:10px 22px;
            border-radius:6px; font-size:16px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
            font-weight:700;
        }
        .btn-nav:hover:not(:disabled) { background:#2d2d35; border-color:#555566; }
        .btn-nav:disabled { opacity:0.3; cursor:not-allowed; }
        .btn-primary {
            background:#d97706; border:none;
            color:#fff; padding:10px 28px;
            border-radius:6px; font-size:16px;
            font-weight:700; cursor:pointer;
            transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-primary:hover:not(:disabled) { background:#b45309; }
        .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

        .result-screen { display:none; text-align:center; padding:30px 10px; }
        .result-screen .score { font-size:48px; color:#d97706; font-weight:700; margin:10px 0; }
        .result-stats {
            display:flex; justify-content:center;
            gap:40px; font-size:18px;
            margin:15px 0 25px;
        }
        .result-stats span { font-weight:700; }
        .result-stats .correct { color:#4caf50; }
        .result-stats .wrong { color:#ef4444; }
        .result-list {
            max-width:600px; margin:0 auto;
            text-align:left;
            background:#1a1a24;
            padding:15px 20px;
            border-radius:8px;
            border:1px solid #2d2d38;
            max-height:300px;
            overflow-y:auto;
        }
        .result-list a {
            color:#d97706; text-decoration:none;
            display:block; padding:6px 0;
            border-bottom:1px solid #222;
        }
        .result-list a:hover { text-decoration:underline; }
        .btn-restart { margin-top:25px; }

        @media (max-width:600px) {
            .container { padding:12px; }
            .header h1 { font-size:18px; }
            .question-box .q-text { font-size:17px; }
            .option { font-size:15px; padding:10px 12px; }
            .btn-nav { padding:8px 16px; font-size:14px; }
            .nav-btn { width:28px; height:28px; font-size:11px; }
            .control-bar .counter { font-size:13px; }
            .feedback-box { font-size:15px; }
            .result-stats { gap:20px; font-size:16px; }
        }
        ::-webkit-scrollbar { width:0px; background:transparent; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚖️ Estrutura da Prova — DPC II</h1>
        <div class="header-info">
            <div>45 questões — casos práticos</div>
            <div><strong>Prova Final / Substitutiva</strong></div>
        </div>
    </div>

    <div class="nav-top" id="navTop"></div>

    <div class="control-bar">
        <span class="counter" id="qCounter">Questão 1 de 45</span>
        <div class="actions">
            <button class="btn-small mark-toggle" id="markBtn" onclick="toggleMark()">⭐ Marcar</button>
            <button class="btn-small shuffle" onclick="shuffleQuestions()">🔀 Embaralhar</button>
        </div>
    </div>

    <div id="questionArea">
        <div class="question-box">
            <div class="q-tema" id="qTema">Tema</div>
            <div class="q-text" id="qText">Carregando...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback-box" id="feedbackBox">
                <div class="fb-title" id="fbTitle">✅ Correto</div>
                <div id="fbText">Explicação...</div>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← Anterior</button>
        <button class="btn-primary" id="finalizarBtn" onclick="showResults()">Finalizar</button>
        <button class="btn-nav" id="nextBtn" onclick="navigate(1)">Próximo →</button>
    </div>

    <div class="result-screen" id="resultScreen">
        <h2 style="color:#fff;">Revisão concluída</h2>
        <div class="score" id="scorePct">0%</div>
        <div class="result-stats">
            <div><span class="correct" id="correctCount">0</span> acertos</div>
            <div><span class="wrong" id="wrongCount">0</span> erros</div>
            <div><span id="markedCount">0</span> ⭐ marcadas</div>
        </div>
        <div id="wrongList" class="result-list"></div>
        <button class="btn-primary btn-restart" onclick="location.reload()">🔁 Reiniciar simulado</button>
    </div>
</div>

<script>
// ============================================================
// 45 QUESTÕES – ESTRUTURA DA PROVA (CASOS PRÁTICOS)
// ============================================================
const questionsData = [
    // ===== BLOCO 1: CALMON DE PASSOS (PAZ SOCIAL x VERDADE) =====
    { tema: "Paz Social vs Verdade", enunciado: "Q1: De acordo com Calmon de Passos, 'importa mais à ordem jurídica o restabelecimento da paz social que a exaustiva apuração dos fatos'. Assinale a regra que DESAFIA essa afirmação, priorizando a busca da verdade material:", opcoes: [
        "A preclusão em matéria probatória (arts. 223 e 434).",
        "A eficácia preclusiva da coisa julgada (art. 508).",
        "Os amplos poderes instrutórios do juiz (art. 370) e a admissão de provas atípicas (art. 369).",
        "As restrições probatórias nos Juizados Especiais."
    ], correta: 2, explicacao: "Os poderes instrutórios e a atipicidade probatória são marcos da busca pela verdade material, desafiando a visão de Calmon." },
    { tema: "Paz Social vs Verdade", enunciado: "Q2: Ainda sobre Calmon de Passos, assinale a regra que ENDOSSA a afirmação de que o sistema prefere a paz social à exaustiva apuração dos fatos:", opcoes: [
        "O dever de colaboração (art. 378).",
        "A possibilidade de a ré revel produzir provas (art. 349).",
        "A preclusão temporal em matéria probatória e a coisa julgada (arts. 502 e 508).",
        "A rescisória fundada em prova nova (art. 966, VII)."
    ], correta: 2, explicacao: "Preclusões e coisa julgada encerram a discussão em prol da estabilidade, endossando a paz social." },

    // ===== BLOCO 2: PODERES INSTRUTÓRIOS x ÔNUS DA PROVA =====
    { tema: "Poderes Instrutórios", enunciado: "Q3: Sobre a conciliação entre os poderes instrutórios do juiz (art. 370) e a regra do ônus da prova (art. 373), a perspectiva publicista (Bedaque) defende que:", opcoes: [
        "O juiz só pode produzir provas se a parte onerada requerer, sob pena de violar a igualdade.",
        "As regras do ônus da prova são regras de julgamento (última saída), aplicadas apenas na sentença; antes disso, o juiz pode e deve esgotar os meios instrutórios.",
        "Os poderes instrutórios são absolutos e independem do ônus da prova em qualquer hipótese.",
        "O juiz não pode produzir provas de ofício em direitos disponíveis."

    { tema: "Poderes Instrutórios", enunciado: "Q4: O não atendimento pela parte à regra do art. 373 (ônus da prova) gera qual consequência?", opcoes: [
        "Multa processual.",
        "Extinção do processo.",
        "Sanção consistente no julgamento desfavorável (regra de julgamento), se a dúvida persistir após a instrução.",
        "Inversão automática do ônus."
    ], correta: 2, explicacao: "O ônus objetivo é sanção de natureza processual: na dúvida, julga-se contra quem tinha o encargo de provar." },

    // ===== BLOCO 3: LITISCONSÓRCIO E SOLIDARIEDADE =====
    { tema: "Litisconsórcio", enunciado: "Q5: Em ação de cobrança contra apenas um devedor solidário, a juíza pode determinar a inclusão dos demais de ofício?", opcoes: [
        "Sim, pois a solidariedade exige litisconsórcio necessário.",
        "Não, a solidariedade passiva é litisconsórcio facultativo (art. 275 CC). A inclusão de ofício só é possível no necessário (art. 115).",
        "Sim, se o autor concordar.",
        "Não, mas o réu pode denunciar os demais."
    ], correta: 1, explicacao: "Art. 275 CC: credor pode cobrar de um ou de todos. Logo, litisconsórcio facultativo. A inclusão de ofício é vedada." },
    { tema: "Litisconsórcio", enunciado: "Q6: O autor-credor pode ser compelido a litigar com um devedor solidário contra o qual não propôs demanda? Como?", opcoes: [
        "Sim, por denunciação da lide (art. 125).",
        "Sim, por chamamento ao processo (art. 130), que é exceção à faculdade do credor.",
        "Não, o autor escolhe os réus.",
        "Sim, por determinação judicial de ofício."
    ], correta: 1, explicacao: "O chamamento ao processo (art. 130) permite ao réu integrar os demais devedores solidários, mesmo contra a vontade do autor." },

    // ===== BLOCO 4: COISA JULGADA – CONCEITO E LIMITES =====
    { tema: "Coisa Julgada", enunciado: "Q7: A coisa julgada material atinge, em regra, qual parte da sentença?", opcoes: [
        "Os motivos e a verdade dos fatos.",
        "Apenas o dispositivo (decisum), conforme art. 504.",
        "O relatório e a motivação.",
        "Toda a fundamentação."
    ], correta: 1, explicacao: "Art. 504: a coisa julgada limita-se ao dispositivo. Os motivos não são alcançados (regra geral)." },
    { tema: "Coisa Julgada", enunciado: "Q8: A sentença que extingue o processo por ilegitimidade de parte (art. 485, VI) faz que tipo de coisa julgada?", opcoes: [
        "Coisa julgada material.",
        "Coisa julgada formal, permitindo a repropositura após correção do vício (art. 486, §1º).",
        "Nenhuma coisa julgada.",
        "Coisa julgada material, pois a ilegitimidade é questão de mérito."
    ], correta: 1, explicacao: "Art. 485, VI c/c 486, §1º: extinção sem mérito gera apenas coisa julgada formal, permitindo nova ação." },

    // ===== BLOCO 5: DESAFIO – ACIDENTE DE TRÂNSITO (PROVA FINAL) =====
    { tema: "Caso Prático – Acidente", enunciado: "Q9: Carlos perdeu ação contra a Viação Subino (trânsito em julgado). Depois, a Andança o processa. Carlos denuncia a Viação com base em depoimento trabalhista novo da condutora. O juiz deve:", opcoes: [
        "Admitir a denunciação, pois a prova nova autoriza a reabertura.",
        "Inadmitir a denunciação, pois há identidade de demandas e a eficácia preclusiva da coisa julgada (art. 508) impede a rediscussão.",

        "Aplicar a teoria da relativização da coisa julgada."
    ], correta: 1, explicacao: "Coisa julgada material + eficácia preclusiva (art. 508) impedem a rediscussão. A prova nova não autoriza reabertura por vias ordinárias." },
    { tema: "Caso Prático – Acidente", enunciado: "Q10: No caso anterior, se Carlos quisesse atacar a decisão da primeira ação (que transitou em julgado) com base na prova falsa, qual seria a via adequada?", opcoes: [

    ], correta: 1, explicacao: "Prova falsa é fundamento para ação rescisória (art. 966, VII), desde que respeitado o prazo decadencial de 2 anos." },

    // ===== BLOCO 6: PARADIGMA OBJETIVISTA E DESTINATÁRIOS =====

    { tema: "Paradigma Objetivista", enunciado: "Q12: Quem são os destinatários da prova no processo moderno?", opcoes: [
        "Apenas o juiz.",
        "O juiz, as partes e a sociedade.",
        "Apenas as partes.",
        "O Ministério Público."
    ], correta: 1, explicacao: "Passagem do paradigma subjetivista para o objetivista: a prova é direito à informação, com destinatários múltiplos." },

    // ===== BLOCO 7: STANDARD, ÔNUS SUBJETIVO E OBJETIVO =====
    { tema: "Standard e Ônus", enunciado: "Q13: Assinale a correlação correta entre standard probatório, ônus subjetivo e ônus objetivo:", opcoes: [
        "Standard é regra de conduta; ônus objetivo é regra de julgamento; ônus subjetivo é grau de evidência.",
        "Standard é o grau de evidência; ônus subjetivo é a regra de conduta (incentivo à produção); ônus objetivo é a regra de julgamento (evita o non liquet).",
        "Standard é a regra de julgamento; ônus subjetivo é o grau de evidência; ônus objetivo é a regra de conduta.",

    { tema: "Standard e Ônus", enunciado: "Q14: Qual a relação lógica entre o standard probatório e o ônus objetivo da prova?", opcoes: [

    // ===== BLOCO 8: OBJETO DA PROVA =====
    { tema: "Objeto da Prova", enunciado: "Q15: A afirmação 'o objeto da prova no processo são os fatos do mérito' é imprecisa. Assinale a razão correta:", opcoes: [

    // ===== BLOCO 10: DESAFIO – RECONVENÇÃO COM DÍVIDA VINCENDA =====

// ============================================================
//  ESTADO E LÓGICA (idêntica ao padrão)
// ============================================================
let questions = [];
let userAnswers = [];
let marked = [];
let currentIndex = 0;

function init() {
    questions = questionsData.map((q, idx) => ({ ...q, originalIndex: idx }));
    userAnswers = new Array(questions.length).fill(-1);
    marked = new Array(questions.length).fill(false);
    renderNav();
    renderQuestion();
    updateButtons();
}

function renderNav() {
    const nav = document.getElementById('navTop');
    nav.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.dataset.idx = i;
        btn.textContent = i + 1;
        if (i === currentIndex) btn.classList.add('active');
        if (userAnswers[i] !== -1) {
            const isCorrect = questions[i].correta === userAnswers[i];
            btn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
        }
        if (marked[i]) btn.classList.add('marked');
        btn.onclick = () => { goTo(i); };
        nav.appendChild(btn);
    }
}

function updateNav() {
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach((btn, idx) => {
        btn.classList.remove('active', 'answered-correct', 'answered-wrong', 'marked');
        if (idx === currentIndex) btn.classList.add('active');
        if (userAnswers[idx] !== -1) {
            const isCorrect = questions[idx].correta === userAnswers[idx];
            btn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
        }
        if (marked[idx]) btn.classList.add('marked');
    });
}

function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('qTema').textContent = '📌 ' + q.tema;
    document.getElementById('qText').textContent = q.enunciado;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const feedback = document.getElementById('feedbackBox');
    feedback.style.display = 'none';

    const markBtn = document.getElementById('markBtn');
    markBtn.textContent = marked[currentIndex] ? '⭐ Desmarcar' : '⭐ Marcar';
    markBtn.classList.toggle('active', marked[currentIndex]);

    q.opcoes.forEach((text, idx) => {
        const div = document.createElement('div');
        div.className = 'option';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'question';
        radio.value = idx;
        radio.disabled = (userAnswers[currentIndex] !== -1);
        if (userAnswers[currentIndex] === idx) radio.checked = true;
        radio.onchange = () => { selectOption(idx); };
        div.appendChild(radio);
        div.appendChild(document.createTextNode(' ' + text));
        container.appendChild(div);
    });

    if (userAnswers[currentIndex] !== -1) {
        showFeedback(currentIndex);
        const opts = container.querySelectorAll('.option');
        opts.forEach((el, idx) => {
            el.classList.add('disabled');
            const radio = el.querySelector('input');
            radio.disabled = true;
            if (idx === q.correta) el.classList.add('correct');
            if (idx === userAnswers[currentIndex] && idx !== q.correta) el.classList.add('wrong');
        });
    }

    document.getElementById('qCounter').textContent =
        'Questão ' + (currentIndex + 1) + ' de ' + questions.length;
    updateButtons();
}

function selectOption(idx) {
    if (userAnswers[currentIndex] !== -1) return;
    userAnswers[currentIndex] = idx;
    renderQuestion();
    showFeedback(currentIndex);
    updateNav();
}

function showFeedback(idx) {
    const q = questions[idx];
    const fb = document.getElementById('feedbackBox');
    const title = document.getElementById('fbTitle');
    const text = document.getElementById('fbText');
    const isCorrect = (userAnswers[idx] === q.correta);
    title.textContent = isCorrect ? '✅ Resposta correta!' : '❌ Resposta incorreta.';
    title.className = 'fb-title ' + (isCorrect ? 'correct' : 'wrong');
    text.textContent = q.explicacao;
    fb.style.display = 'block';
}

function goTo(idx) {
    if (idx < 0 || idx >= questions.length) return;
    currentIndex = idx;
    renderQuestion();
    updateNav();
    document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function navigate(delta) {
    const newIdx = currentIndex + delta;
    if (newIdx >= 0 && newIdx < questions.length) goTo(newIdx);
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = (currentIndex === 0);
    document.getElementById('nextBtn').disabled = (currentIndex === questions.length - 1);
}

function toggleMark() {
    marked[currentIndex] = !marked[currentIndex];
    renderQuestion();
    updateNav();
}

function shuffleQuestions() {
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    userAnswers = new Array(questions.length).fill(-1);
    marked = new Array(questions.length).fill(false);
    currentIndex = 0;
    renderNav();
    renderQuestion();
    updateButtons();
}

function showResults() {
    let correct = 0, wrong = 0, markedCount = 0;
    const wrongList = [];
    for (let i = 0; i < questions.length; i++) {
        if (userAnswers[i] !== -1) {
            if (userAnswers[i] === questions[i].correta) correct++;
            else { wrong++; wrongList.push(i); }
        } else {
            wrong++; wrongList.push(i);
        }
        if (marked[i]) markedCount++;
    }
    const total = questions.length;
    const pct = Math.round((correct / total) * 100);

    document.getElementById('scorePct').textContent = pct + '%';
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('markedCount').textContent = markedCount;

    const listDiv = document.getElementById('wrongList');
    listDiv.innerHTML = '';
    if (wrongList.length === 0) {
        listDiv.innerHTML = '<p style="color:#a7f3d0;">🎉 Parabéns! Você acertou todas!</p>';
    } else {
        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        ul.style.padding = '0';
        wrongList.forEach(idx => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = `Questão ${idx+1}: ${questions[idx].tema}`;
            a.onclick = (e) => {
                e.preventDefault();
                document.getElementById('resultScreen').style.display = 'none';
                document.getElementById('questionArea').style.display = 'block';
                goTo(idx);
            };
            li.appendChild(a);
            ul.appendChild(li);
        });
        listDiv.appendChild(ul);
    }

    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('navTop').style.display = 'none';
    document.querySelector('.control-bar').style.display = 'none';
    document.querySelector('.nav-bottom').style.display = 'none';
}

init();
</script>
