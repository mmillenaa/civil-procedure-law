<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulado Variações — Processo Civil II (60 lacunas)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f0f10; color:#e4e4ed;
            font-family:'Cardo',Georgia,serif;
            font-size:17px; line-height:1.5;
            padding:20px 15px;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
        }
        .container {
            max-width:860px; width:100%;
            background:#16161a;
            border:1px solid #2d2d38;
            border-radius:12px;
            padding:20px 20px 30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.7);
        }
        .header {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
            border-bottom:1px solid #2d2d38;
            padding-bottom:12px;
        }
        .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
        .header-info { text-align:right; font-size:13px; color:#9494a1; }
        .header-info strong { color:#d97706; }

        .nav-top {
            display:flex; flex-wrap:wrap;
            gap:6px 5px;
            justify-content:center;
            margin:10px 0 16px;
            padding:6px 0;
            border-bottom:1px solid #1f1f26;
        }
        .nav-btn {
            width:32px; height:32px;
            border-radius:4px;
            border:1px solid #333340;
            background:#222227;
            color:#888;
            font-size:12px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            font-family:system-ui, sans-serif;
        }
        .nav-btn:hover { background:#31313d; color:#fff; }
        .nav-btn.active { border-color:#d97706; background:#d97706; color:#fff; box-shadow:0 0 8px #d9770680; }
        .nav-btn.answered-correct { background:#2e7d32; border-color:#2e7d32; color:#fff; opacity:0.8; }
        .nav-btn.answered-wrong { background:#c62828; border-color:#c62828; color:#fff; opacity:0.8; }
        .nav-btn.marked { position:relative; }
        .nav-btn.marked::after { content:"⭐"; position:absolute; top:-6px; right:-6px; font-size:11px; line-height:1; }

        .control-bar {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
        }
        .control-bar .counter { font-size:15px; color:#9494a1; }
        .control-bar .actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-small {
            background:#222227; border:1px solid #333340;
            color:#e4e4ed; padding:6px 14px;
            border-radius:6px; font-size:14px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-small:hover { background:#2d2d35; border-color:#555; }
        .btn-small.mark-toggle { color:#fbbf24; }
        .btn-small.mark-toggle.active { background:#3b2f1a; border-color:#fbbf24; }
        .btn-small.shuffle { color:#60a5fa; }

        .question-box {
            background:#1a1a24;
            border-left:4px solid #d97706;
            padding:18px 20px;
            border-radius:6px;
            margin-bottom:18px;
        }
        .question-box .q-tema {
            font-size:13px; color:#d97706;
            font-weight:700; margin-bottom:6px;
        }
        .question-box .q-text {
            font-size:18px; color:#ffffff;
            margin-bottom:12px;
            line-height:2;
        }
        .question-box .q-text input[type="text"] {
            background:#222227;
            border:1px solid #444456;
            border-radius:4px;
            color:#fff;
            font-family:'Cardo',Georgia,serif;
            font-size:17px;
            padding:2px 8px;
            width:160px;
            margin:0 4px;
            transition:0.2s;
        }
        .question-box .q-text input[type="text"]:focus {
            border-color:#d97706;
            outline:none;
            box-shadow:0 0 6px #d9770680;
        }
        .question-box .q-text input.correct-input {
            border-color:#4caf50;
            background:rgba(76,175,80,0.15);
        }
        .question-box .q-text input.wrong-input {
            border-color:#ef4444;
            background:rgba(239,68,68,0.15);
        }

        .feedback-box {
            background:#1c1c24;
            border-left:4px solid #d97706;
            padding:14px 16px;
            border-radius:6px;
            margin-top:16px;
            display:none;
            font-size:16px;
            line-height:1.5;
            color:#d1d1d6;
        }
        .feedback-box .fb-title { font-weight:700; margin-bottom:4px; }
        .feedback-box .fb-title.correct { color:#4caf50; }
        .feedback-box .fb-title.wrong { color:#ef4444; }
        .feedback-box .fb-answers {
            background:#111115;
            padding:10px 14px;
            border-radius:4px;
            margin-top:6px;
            font-size:15px;
        }
        .feedback-box .fb-answers strong { color:#d97706; }

        .nav-bottom {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-top:20px;
            flex-wrap:wrap;
        }
        .btn-nav {
            background:#222227; border:1px solid #2d2d38;
            color:#e4e4ed; padding:10px 22px;
            border-radius:6px; font-size:16px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
            font-weight:700;
        }
        .btn-nav:hover:not(:disabled) { background:#2d2d35; border-color:#555566; }
        .btn-nav:disabled { opacity:0.3; cursor:not-allowed; }
        .btn-primary {
            background:#d97706; border:none;
            color:#fff; padding:10px 28px;
            border-radius:6px; font-size:16px;
            font-weight:700; cursor:pointer;
            transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-primary:hover:not(:disabled) { background:#b45309; }
        .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

        .result-screen { display:none; text-align:center; padding:30px 10px; }
        .result-screen .score { font-size:48px; color:#d97706; font-weight:700; margin:10px 0; }
        .result-stats {
            display:flex; justify-content:center;
            gap:40px; font-size:18px;
            margin:15px 0 25px;
        }
        .result-stats span { font-weight:700; }
        .result-stats .correct { color:#4caf50; }
        .result-stats .wrong { color:#ef4444; }
        .result-list {
            max-width:600px; margin:0 auto;
            text-align:left;
            background:#1a1a24;
            padding:15px 20px;
            border-radius:8px;
            border:1px solid #2d2d38;
            max-height:300px;
            overflow-y:auto;
        }
        .result-list a {
            color:#d97706; text-decoration:none;
            display:block; padding:6px 0;
            border-bottom:1px solid #222;
        }
        .result-list a:hover { text-decoration:underline; }
        .btn-restart { margin-top:25px; }

        @media (max-width:600px) {
            .container { padding:12px; }
            .header h1 { font-size:18px; }
            .question-box .q-text { font-size:17px; }
            .question-box .q-text input[type="text"] { width:110px; font-size:15px; }
            .btn-nav { padding:8px 16px; font-size:14px; }
            .nav-btn { width:28px; height:28px; font-size:11px; }
            .control-bar .counter { font-size:13px; }
            .feedback-box { font-size:15px; }
            .result-stats { gap:20px; font-size:16px; }
        }
        ::-webkit-scrollbar { width:0px; background:transparent; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚖️ Variações — Processo Civil II</h1>
        <div class="header-info">
            <div>60 questões — preenchimento de lacuna</div>
            <div><strong>DPC 0319</strong> — USP</div>
        </div>
    </div>

    <div class="nav-top" id="navTop"></div>

    <div class="control-bar">
        <span class="counter" id="qCounter">Questão 1 de 60</span>
        <div class="actions">
            <button class="btn-small mark-toggle" id="markBtn" onclick="toggleMark()">⭐ Marcar</button>
            <button class="btn-small shuffle" onclick="shuffleQuestions()">🔀 Embaralhar</button>
        </div>
    </div>

    <div id="questionArea">
        <div class="question-box">
            <div class="q-tema" id="qTema">Tema</div>
            <div class="q-text" id="qText"></div>
            <div class="feedback-box" id="feedbackBox">
                <div class="fb-title" id="fbTitle">✅ Correto</div>
                <div id="fbText"></div>
                <div class="fb-answers" id="fbAnswers"></div>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← Anterior</button>
        <button class="btn-primary" id="confirmBtn" onclick="confirmAnswer()">Confirmar</button>
        <button class="btn-nav" id="nextBtn" onclick="navigate(1)">Próximo →</button>
    </div>

    <div class="result-screen" id="resultScreen">
        <h2 style="color:#fff;">Revisão concluída</h2>
        <div class="score" id="scorePct">0%</div>
        <div class="result-stats">
            <div><span class="correct" id="correctCount">0</span> acertos</div>
            <div><span class="wrong" id="wrongCount">0</span> erros</div>
            <div><span id="markedCount">0</span> ⭐ marcadas</div>
        </div>
        <div id="wrongList" class="result-list"></div>
        <button class="btn-primary btn-restart" onclick="location.reload()">🔁 Reiniciar simulado</button>
    </div>
</div>

<script>
// ============================================================
// 60 QUESTÕES CONVERTIDAS PARA PREENCHIMENTO DE LACUNA
// ============================================================
const questionsData = [
    // ===== TEMA 1: COISA JULGADA E EFICÁCIA (11 questões) =====
    { tema: "Coisa Julgada e Eficácia", texto: "A hipoteca judiciária é o gravame que se forma sobre os bens do devedor a partir da sentença condenatória ______ em julgado, independentemente de requerimento.", blanks: ["transitada"], explicacao: "Art. 495, CPC: a hipoteca judiciária é efeito secundário da sentença condenatória, constituindo-se automaticamente após o trânsito em julgado." },
    { tema: "Coisa Julgada e Eficácia", texto: "A sentença que extingue o processo por ilegitimidade de parte faz coisa julgada ______, pois não julga o mérito, permitindo repropositura após correção do vício.", blanks: ["formal"], explicacao: "Art. 485, VI c/c 486, §1º: extinção sem mérito gera coisa julgada formal." },
    { tema: "Coisa Julgada e Eficácia", texto: "A ação rescisória (art. 966) tem prazo de ______ anos, contado do trânsito em julgado da decisão que se quer rescindir.", blanks: ["2"], explicacao: "Art. 975: prazo decadencial de 2 anos contado do trânsito em julgado." },
    { tema: "Coisa Julgada e Eficácia", texto: "A querela nullitatis (art. 525, §1º, I) pode ser ajuizada a qualquer tempo para vício ______, como a falta de citação válida do réu.", blanks: ["transrescisório"], explicacao: "A querela nullitatis é cabível a qualquer tempo para nulidades absolutas, pois o vício é transrescisório." },
    { tema: "Coisa Julgada e Eficácia", texto: "Em ação de alimentos (relação de trato continuado), a sentença pode ser revista por ação ______, com efeitos ex nunc, se houver alteração do estado de fato.", blanks: ["revisional"], explicacao: "Art. 505, I: ação revisional para relações continuativas, com efeitos ex nunc." },
    { tema: "Coisa Julgada e Eficácia", texto: "A 'função positiva da coisa julgada' (prejudicialidade) impõe que o comando transitado em julgado seja respeitado em outro processo dependente, como a decisão de ______ que vincula a ação de alimentos.", blanks: ["filiação"], explicacao: "Função positiva: a coisa julgada age como premissa inafastável (prejudicialidade)." },
    { tema: "Coisa Julgada e Eficácia", texto: "A coisa julgada material atinge os ______ universais da parte (ex: herdeiros), que sucedem a parte em todos os direitos e obrigações processuais.", blanks: ["sucessores"], explicacao: "Art. 506, parágrafo único: sucessores universais vinculam-se pela coisa julgada." },
    { tema: "Coisa Julgada e Eficácia", texto: "A eficácia preclusiva da coisa julgada (art. ______) impede a parte de alegar fatos que já existiam e não foram opostos, considerando-os deduzidos e repelidos.", blanks: ["508"], explicacao: "Art. 508: eficácia preclusiva – vedação de reabrir com argumentos já existentes." },
    { tema: "Coisa Julgada e Eficácia", texto: "A sentença arbitral produz coisa julgada, mas a impugnação é por ação ______ (prazo de 90 dias), restrita a defeitos de forma graves.", blanks: ["anulatória"], explicacao: "Lei de Arbitragem, art. 33: ação anulatória em 90 dias, não rescisória." },
    { tema: "Coisa Julgada e Eficácia", texto: "A estabilidade da tutela antecipada antecedente (art. 304) não é coisa julgada; pode ser revista em ação própria no prazo de ______ anos.", blanks: ["2"], explicacao: "Art. 304, §6º: estabilidade não é coisa julgada; ação revisional em até 2 anos." },
    { tema: "Coisa Julgada e Eficácia", texto: "A relativização da coisa julgada é criticada por gerar ______ jurídica, pois a estabilidade das decisões é um pilar do sistema.", blanks: ["insegurança"], explicacao: "A relativização é criticada por enfraquecer a segurança jurídica, um dos pilares da coisa julgada." },

    // ===== TEMA 2: PROVA – APROFUNDAMENTOS (10 questões) =====
    { tema: "Prova – Aprofundamentos", texto: "A ata notarial (art. 384) é um documento ______ que atesta fatos constatados pelo tabelião, com fé pública.", blanks: ["público"], explicacao: "A ata notarial é documento público, gozando de fé pública." },
    { tema: "Prova – Aprofundamentos", texto: "O juiz pode determinar a perícia mesmo sem quesitos, pois os quesitos são ______ (art. 465, §2º).", blanks: ["facultativos"], explicacao: "Art. 465, §2º: quesitos são facultativos; o juiz pode formular os que entender necessários." },
    { tema: "Prova – Aprofundamentos", texto: "A confissão ficta ocorre quando a parte, regularmente intimada para depoimento pessoal, não comparece ou se recusa a responder, presumindo-se verdadeiros os fatos contra ela alegados (art. ______).", blanks: ["385"], explicacao: "Art. 385: ausência injustificada ao depoimento pessoal gera presunção de veracidade." },
    { tema: "Prova – Aprofundamentos", texto: "A inspeção judicial em residência exige ______ do morador ou autorização judicial (art. 481, §1º), sob pena de ilicitude.", blanks: ["consentimento"], explicacao: "Art. 481, §1º: inspeção em residência exige consentimento ou autorização judicial." },
    { tema: "Prova – Aprofundamentos", texto: "A exibição de documentos é um ______ processual (Tema 1000 STJ), e a recusa autoriza medidas coercitivas.", blanks: ["dever"], explicacao: "STJ Tema 1000: exibição de documentos é dever de cooperação, permitindo medidas coercitivas." },
    { tema: "Prova – Aprofundamentos", texto: "O assistente técnico é um especialista escolhido pela parte, não se confundindo com o perito ______.", blanks: ["judicial"], explicacao: "Art. 465, §1º: assistente técnico é indicado pela parte, não se confunde com o perito judicial." },
    { tema: "Prova – Aprofundamentos", texto: "A prova emprestada é admitida desde que a parte contra quem é usada tenha tido oportunidade de ______ no processo de origem.", blanks: ["contraditório"], explicacao: "STJ (EREsp 617.428): requisito é o contraditório, não a identidade de partes." },
    { tema: "Prova – Aprofundamentos", texto: "Provas atípicas são admitidas desde que ______ legítimas (art. 369).", blanks: ["moralmente"], explicacao: "Art. 369: admitem-se meios atípicos, desde que moralmente legítimos." },
    { tema: "Prova – Aprofundamentos", texto: "A gravação ambiental por um dos interlocutores é, em regra, ______, pois não há quebra de sigilo das comunicações.", blanks: ["lícita"], explicacao: "Jurisprudência consolidada: gravação ambiental por interlocutor é lícita." },
    { tema: "Prova – Aprofundamentos", texto: "A presunção absoluta (iure et de iure) não admite prova em ______, operando como ficção legal.", blanks: ["contrário"], explicacao: "Presunção absoluta = não admite prova em contrário." },

    // ===== TEMA 3: LITISCONSÓRCIO – CASOS ESPECÍFICOS (8 questões) =====
    { tema: "Litisconsórcio", texto: "No litisconsórcio comum, os litisconsortes são considerados litigantes ______ (art. 117), portanto o recurso de um não estende aos demais.", blanks: ["distintos"], explicacao: "Art. 117: no litisconsórcio comum, cada litisconsorte é autônomo." },
    { tema: "Litisconsórcio", texto: "O desmembramento do litisconsórcio multitudinário (art. 113, §1º) é matéria de ordem pública e pode ser feito de ______.", blanks: ["ofício"], explicacao: "Art. 113, §1º: desmembramento pode ser determinado de ofício." },
    { tema: "Litisconsórcio", texto: "Em litisconsórcio necessário unitário, a desistência de um dos autores é ______ se não houver concordância de todos.", blanks: ["ineficaz"], explicacao: "No unitário, atos causativos (desistência) são ineficazes se praticados por apenas um." },
    { tema: "Litisconsórcio", texto: "No litisconsórcio unitário, a confissão de um réu é ineficaz para gerar presunção contra os demais (art. ______), mas permanece como elemento probatório.", blanks: ["391"], explicacao: "Art. 391: confissão de um não prejudica os litisconsortes." },
    { tema: "Litisconsórcio", texto: "A intervenção litisconsorcial voluntária é aquela em que terceiro entra para pedir algo ______ contra o mesmo réu (pretensão própria).", blanks: ["diferente"], explicacao: "Intervenção litisconsorcial voluntária: terceiro formula pedido próprio." },
    { tema: "Litisconsórcio", texto: "No litisconsórcio necessário passivo, o prazo para contestar começa a contar da data em que se inicia o prazo para o ______ citado (art. 231, §1º).", blanks: ["último"], explicacao: "Art. 231, §1º: no litisconsórcio passivo, prazo para todos começa do último citado." },
    { tema: "Litisconsórcio", texto: "A sentença em litisconsórcio necessário comum (ex: usucapião) sem a citação de um confinante é ineficaz apenas para o ______ (art. 115, II).", blanks: ["não citado"], explicacao: "Art. 115, II: sentença ineficaz apenas para os não citados." },
    { tema: "Litisconsórcio", texto: "No litisconsórcio facultativo, a desistência de um autor é livre (autonomia), mas exige a ______ do réu (art. 485, §4º).", blanks: ["anuência"], explicacao: "Art. 485, §4º: desistência com anuência do réu." },

    // ===== TEMA 4: INTERVENÇÃO DE TERCEIROS – DETALHES (8 questões) =====
    { tema: "Intervenção de Terceiros", texto: "A denunciação da lide (art. 125) é ______, cabível para garantia por evicção ou obrigação contratual/legal de indenizar.", blanks: ["facultativa"], explicacao: "Art. 125: faculdade do denunciante." },
    { tema: "Intervenção de Terceiros", texto: "O chamamento ao processo (art. 130) é cabível para integrar ao processo o afiançado, os demais fiadores e os demais devedores ______.", blanks: ["solidários"], explicacao: "Art. 130: chamamento para devedores solidários, fiadores e afiançado." },
    { tema: "Intervenção de Terceiros", texto: "O Incidente de Desconsideração da Personalidade Jurídica (IDPJ) depende de requerimento da parte ou do Ministério Público (art. ______), não podendo ser instaurado de ofício.", blanks: ["133"], explicacao: "Art. 133: IDPJ deve ser requerido; juiz não pode instaurar de ofício." },
    { tema: "Intervenção de Terceiros", texto: "Na assistência simples, o assistente não pode contrariar os atos do assistido (art. ______).", blanks: ["121"], explicacao: "Art. 121: assistente não pode contrariar os atos do assistido." },
    { tema: "Intervenção de Terceiros", texto: "O amicus curiae (art. 138) tem poderes limitados, mas pode opor embargos de ______ e, em repetitivos, interpor recursos.", blanks: ["declaração"], explicacao: "Amicus curiae pode opor embargos de declaração e, em repetitivos, interpor recursos." },
    { tema: "Intervenção de Terceiros", texto: "O assistente simples fica sujeito à 'eficácia da intervenção' (art. ______), não podendo rediscutir a justiça da decisão.", blanks: ["123"], explicacao: "Art. 123: eficácia da intervenção – assistente fica vinculado." },
    { tema: "Intervenção de Terceiros", texto: "A oposição (art. 682) proposta antes da audiência será processada em ______ com a ação originária (art. 683).", blanks: ["conjunto"], explicacao: "Art. 683: oposição proposta antes da audiência é processada em conjunto." },
    { tema: "Intervenção de Terceiros", texto: "A substituição de parte ilegítima (art. 338) ocorre na fase postulatória, em ______.", blanks: ["réplica"], explicacao: "Art. 338: substituição de parte ilegítima na réplica." },

    // ===== TEMA 5: RECURSOS – EFEITOS E ESPÉCIES (8 questões) =====
    { tema: "Recursos", texto: "A apelação contra sentença que julga ______ ou que concede tutela provisória não tem efeito suspensivo (art. 1.012, §1º).", blanks: ["alimentos"], explicacao: "Art. 1.012, §1º, IV: apelação sobre alimentos não tem efeito suspensivo." },
    { tema: "Recursos", texto: "O efeito devolutivo da apelação (art. 1.013) transfere ao tribunal o conhecimento da matéria impugnada, com a ______ do pedido.", blanks: ["extensão"], explicacao: "Efeito devolutivo: devolve ao tribunal a análise das questões, nos limites do pedido." },
    { tema: "Recursos", texto: "Os embargos de declaração podem ter efeito ______ (infringente) quando a correção da omissão modifica o resultado da decisão.", blanks: ["modificativo"], explicacao: "Embargos de declaração podem ter efeito infringente, alterando o julgado." },
    { tema: "Recursos", texto: "O agravo interno (art. 1.021) é cabível contra decisão ______ do relator no tribunal.", blanks: ["monocrática"], explicacao: "Art. 1.021: agravo interno contra decisão monocrática do relator." },
    { tema: "Recursos", texto: "O STJ adota a '______ mitigada' para o agravo de instrumento, admitindo-o fora da lista do art. 1.015 em casos de urgência.", blanks: ["taxatividade"], explicacao: "STJ, EREsp 1.478.203: taxatividade mitigada." },
    { tema: "Recursos", texto: "O recurso especial (art. 1.029) tem prazo de ______ dias úteis.", blanks: ["15"], explicacao: "Art. 1.003, §5º: prazo de 15 dias úteis para todos os recursos." },
    { tema: "Recursos", texto: "O juízo de retratação no agravo de instrumento (art. 1.018, §3º) permite que o juiz de primeiro grau ______ sua decisão antes de enviar os autos ao tribunal.", blanks: ["reconsidere"], explicacao: "Art. 1.018, §3º: juízo de retratação – juiz pode reconsiderar a decisão." },
    { tema: "Recursos", texto: "A renúncia ao direito de recorrer (art. 1.000) deve ser expressa e feita ______ a decisão, não antes.", blanks: ["após"], explicacao: "Art. 1.000: renúncia é admissível após a decisão que se quer recorrer." },

    // ===== TEMA 6: PROCEDIMENTOS ESPECIAIS E FORMAS (8 questões) =====
    { tema: "Procedimentos Especiais", texto: "Na ação possessória, a liminar exige prova documental da posse e do esbulho recente (menos de ______ e dia).", blanks: ["ano"], explicacao: "Art. 562: liminar exige prova da posse e esbulho há menos de ano e dia." },
    { tema: "Procedimentos Especiais", texto: "Na ação de exigir contas, se o réu não apresentar as contas, o juiz pode determinar a liquidação por ______ (art. 550).", blanks: ["arbitramento"], explicacao: "Art. 550: se o réu não prestar contas, liquidação por arbitramento." },
    { tema: "Procedimentos Especiais", texto: "No inventário, o ______ é a pessoa nomeada pelo juiz para administrar o espólio e representá-lo no processo.", blanks: ["inventariante"], explicacao: "Inventariante é o administrador do espólio, representando-o no inventário." },
    { tema: "Procedimentos Especiais", texto: "A consignação em pagamento (art. 539) é cabível quando o credor recusa ou não pode receber, ou há ______ sobre o credor.", blanks: ["dúvida"], explicacao: "Art. 539: cabe consignação se o credor recusa ou há dúvida sobre o credor." },
    { tema: "Procedimentos Especiais", texto: "A ação de nunciação de obra nova visa impedir a continuação de obra que cause prejuízo à posse ou ______ do autor.", blanks: ["propriedade"], explicacao: "Nunciação de obra nova impede obra que ameaça a posse ou propriedade." },

    { tema: "Teoria Geral", texto: "A litispendência (art. 485, V) caracteriza-se por duas ações idênticas (mesmas partes, pedido e causa de pedir) tramitando ______.", blanks: ["simultaneamente"], explicacao: "Litispendência = identidade de partes, pedido e causa de pedir, tramitando ao mesmo tempo." },

    { tema: "Teoria Geral", texto: "A incompetência absoluta (matéria, função) pode ser conhecida de ofício pelo juiz a qualquer tempo (art. 64, §1º), pois é de ordem ______.", blanks: ["pública"], explicacao: "Incompetência absoluta é de ordem pública, cognoscível de ofício a qualquer tempo." },
    { tema: "Teoria Geral", texto: "A convenção arbitral (Lei 9.307/96) deve ser ______, podendo ser cláusula compromissória ou compromisso arbitral.", blanks: ["escrita"], explicacao: "Art. 4º, §1º: convenção arbitral deve ser escrita." },
    { tema: "Teoria Geral", texto: "O negócio jurídico processual (art. 190) permite mudanças no procedimento e ônus probatório, desde que não afetem direitos ______.", blanks: ["indisponíveis"], explicacao: "Art. 190: negócio jurídico processual não pode versar sobre direitos indisponíveis." },
    { tema: "Teoria Geral", texto: "A produção antecipada de provas (art. 381) é cabível para justificar ou evitar o ajuizamento de ação, viabilizar autocomposição ou quando a prova for ______.", blanks: ["urgente"], explicacao: "Art. 381, incisos: I (urgência), II (autocomposição), III (evitar o ajuizamento)." }
];

// ============================================================
//  ESTADO E LÓGICA
// ============================================================
let questions = [];
let userStatus = []; // -1 = não respondida, 0 = errou, 1 = acertou
let userInputs = []; // array de arrays com os textos digitados
let marked = [];
let currentIndex = 0;

function init() {
    questions = questionsData.map((q, idx) => ({ ...q, originalIndex: idx }));
    userStatus = new Array(questions.length).fill(-1);
    userInputs = new Array(questions.length).fill(null);
    marked = new Array(questions.length).fill(false);
    renderNav();
    renderQuestion();
    updateButtons();
}

function renderNav() {
    const nav = document.getElementById('navTop');
    nav.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.dataset.idx = i;
        btn.textContent = i + 1;
        if (i === currentIndex) btn.classList.add('active');
        if (userStatus[i] === 1) btn.classList.add('answered-correct');
        else if (userStatus[i] === 0) btn.classList.add('answered-wrong');
        if (marked[i]) btn.classList.add('marked');
        btn.onclick = () => { goTo(i); };
        nav.appendChild(btn);
    }
}

function updateNav() {
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach((btn, idx) => {
        btn.classList.remove('active', 'answered-correct', 'answered-wrong', 'marked');
        if (idx === currentIndex) btn.classList.add('active');
        if (userStatus[idx] === 1) btn.classList.add('answered-correct');
        else if (userStatus[idx] === 0) btn.classList.add('answered-wrong');
        if (marked[idx]) btn.classList.add('marked');
    });
}

function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('qTema').textContent = '📌 ' + q.tema;
    document.getElementById('feedbackBox').style.display = 'none';

    const markBtn = document.getElementById('markBtn');
    markBtn.textContent = marked[currentIndex] ? '⭐ Desmarcar' : '⭐ Marcar';
    markBtn.classList.toggle('active', marked[currentIndex]);

    // Montar texto com inputs
    const container = document.getElementById('qText');
    container.innerHTML = '';
    const parts = q.texto.split('______');
    const numBlanks = q.blanks.length;

    const savedValues = userInputs[currentIndex] || [];

    for (let i = 0; i < parts.length; i++) {
        container.appendChild(document.createTextNode(parts[i]));
        if (i < numBlanks) {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'blank-' + i;
            input.className = 'blank-input';
            input.autocomplete = 'off';
            if (savedValues[i]) {
                input.value = savedValues[i];
            }
            if (userStatus[currentIndex] !== -1) {
                input.disabled = true;
                if (input.value.trim().toLowerCase() === q.blanks[i].trim().toLowerCase()) {
                    input.classList.add('correct-input');
                } else {
                    input.classList.add('wrong-input');
                }
            } else {
                input.disabled = false;
                input.onkeydown = (e) => { if (e.key === 'Enter') confirmAnswer(); };
            }
            container.appendChild(input);
            container.appendChild(document.createTextNode(' '));
        }
    }

    document.getElementById('qCounter').textContent =
        'Questão ' + (currentIndex + 1) + ' de ' + questions.length;
    updateButtons();

    if (userStatus[currentIndex] !== -1) {
        showFeedback(currentIndex);
    }
}

function confirmAnswer() {
    if (userStatus[currentIndex] !== -1) return;

    const q = questions[currentIndex];
    const inputs = document.querySelectorAll('.blank-input');
    let allCorrect = true;
    const userValues = [];

    inputs.forEach((inp, idx) => {
        const val = inp.value.trim();
        userValues.push(val);
        const expected = q.blanks[idx].trim().toLowerCase();
        if (val.toLowerCase() !== expected) {
            allCorrect = false;
            inp.classList.add('wrong-input');
        } else {
            inp.classList.add('correct-input');
        }
        inp.disabled = true;
    });

    userInputs[currentIndex] = userValues;
    userStatus[currentIndex] = allCorrect ? 1 : 0;

    updateNav();
    showFeedback(currentIndex);

    if (allCorrect) {
        // 🎉 confetes
        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 }, colors: ['#d97706', '#4caf50', '#fff'] });
    }
}

function showFeedback(idx) {
    const q = questions[idx];
    const fb = document.getElementById('feedbackBox');
    const title = document.getElementById('fbTitle');
    const text = document.getElementById('fbText');
    const answersDiv = document.getElementById('fbAnswers');

    const isCorrect = userStatus[idx] === 1;
    title.textContent = isCorrect ? '✅ Resposta correta!' : '❌ Resposta incorreta.';
    title.className = 'fb-title ' + (isCorrect ? 'correct' : 'wrong');
    text.textContent = q.explicacao;

    let ansHtml = '<strong>Respostas esperadas:</strong> ';
    q.blanks.forEach((b, i) => {
        ansHtml += (i > 0 ? ', ' : '') + '<span style="color:#d97706;">' + b + '</span>';
    });
    answersDiv.innerHTML = ansHtml;

    fb.style.display = 'block';
}

function goTo(idx) {
    if (idx < 0 || idx >= questions.length) return;
    currentIndex = idx;
    renderQuestion();
    updateNav();
    document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function navigate(delta) {
    const newIdx = currentIndex + delta;
    if (newIdx >= 0 && newIdx < questions.length) goTo(newIdx);
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = (currentIndex === 0);
    document.getElementById('nextBtn').disabled = (currentIndex === questions.length - 1);
    document.getElementById('confirmBtn').disabled = (userStatus[currentIndex] !== -1);
}

function toggleMark() {
    marked[currentIndex] = !marked[currentIndex];
    renderQuestion();
    updateNav();
}

function shuffleQuestions() {
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    userStatus = new Array(questions.length).fill(-1);
    userInputs = new Array(questions.length).fill(null);
    marked = new Array(questions.length).fill(false);
    currentIndex = 0;
    renderNav();
    renderQuestion();
    updateButtons();
}

function showResults() {
    let correct = 0, wrong = 0, markedCount = 0;
    const wrongList = [];
    for (let i = 0; i < questions.length; i++) {
        if (userStatus[i] === 1) correct++;
        else if (userStatus[i] === 0) { wrong++; wrongList.push(i); }
        else { wrong++; wrongList.push(i); }
        if (marked[i]) markedCount++;
    }
    const total = questions.length;
    const pct = Math.round((correct / total) * 100);

    document.getElementById('scorePct').textContent = pct + '%';
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('markedCount').textContent = markedCount;

    const listDiv = document.getElementById('wrongList');
    listDiv.innerHTML = '';
    if (wrongList.length === 0) {
        listDiv.innerHTML = '<p style="color:#a7f3d0;">🎉 Parabéns! Você acertou todas!</p>';
    } else {
        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        ul.style.padding = '0';
        wrongList.forEach(idx => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = `Questão ${idx+1}: ${questions[idx].tema}`;
            a.onclick = (e) => {
                e.preventDefault();
                document.getElementById('resultScreen').style.display = 'none';
                document.getElementById('questionArea').style.display = 'block';
                goTo(idx);
            };
            li.appendChild(a);
            ul.appendChild(li);
        });
        listDiv.appendChild(ul);
    }

    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('navTop').style.display = 'none';
    document.querySelector('.control-bar').style.display = 'none';
    document.querySelector('.nav-bottom').style.display = 'none';
}

init();
</script>
