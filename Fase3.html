<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulado Variações — Processo Civil II (60 questões)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f0f10; color:#e4e4ed;
            font-family:'Cardo',Georgia,serif;
            font-size:17px; line-height:1.5;
            padding:20px 15px;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
        }
        .container {
            max-width:860px; width:100%;
            background:#16161a;
            border:1px solid #2d2d38;
            border-radius:12px;
            padding:20px 20px 30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.7);
        }
        .header {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
            border-bottom:1px solid #2d2d38;
            padding-bottom:12px;
        }
        .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
        .header-info { text-align:right; font-size:13px; color:#9494a1; }
        .header-info strong { color:#d97706; }

        .nav-top {
            display:flex;
            flex-wrap:wrap;
            gap:6px 5px;
            justify-content:center;
            margin:10px 0 16px;
            padding:6px 0;
            border-bottom:1px solid #1f1f26;
        }
        .nav-btn {
            width:32px; height:32px;
            border-radius:4px;
            border:1px solid #333340;
            background:#222227;
            color:#888;
            font-size:12px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            font-family:system-ui, sans-serif;
        }
        .nav-btn:hover { background:#31313d; color:#fff; }
        .nav-btn.active { border-color:#d97706; background:#d97706; color:#fff; box-shadow:0 0 8px #d9770680; }
        .nav-btn.answered-correct { background:#2e7d32; border-color:#2e7d32; color:#fff; opacity:0.8; }
        .nav-btn.answered-wrong { background:#c62828; border-color:#c62828; color:#fff; opacity:0.8; }
        .nav-btn.marked { position:relative; }
        .nav-btn.marked::after {
            content:"⭐";
            position:absolute;
            top:-6px; right:-6px;
            font-size:11px;
            line-height:1;
        }

        .control-bar {
            display:flex; flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:15px;
        }
        .control-bar .counter { font-size:15px; color:#9494a1; }
        .control-bar .actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-small {
            background:#222227; border:1px solid #333340;
            color:#e4e4ed; padding:6px 14px;
            border-radius:6px; font-size:14px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-small:hover { background:#2d2d35; border-color:#555; }
        .btn-small.mark-toggle { color:#fbbf24; }
        .btn-small.mark-toggle.active { background:#3b2f1a; border-color:#fbbf24; }
        .btn-small.shuffle { color:#60a5fa; }

        .question-box {
            background:#1a1a24;
            border-left:4px solid #d97706;
            padding:18px 20px;
            border-radius:6px;
            margin-bottom:18px;
        }
        .question-box .q-tema {
            font-size:13px; color:#d97706;
            font-weight:700; margin-bottom:6px;
        }
        .question-box .q-text {
            font-size:18px; color:#ffffff;
            margin-bottom:12px;
        }
        .options { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
        .option {
            background:#222227; border:1px solid #2d2d38;
            border-radius:6px; padding:12px 14px;
            cursor:pointer; transition:0.2s;
            display:flex; align-items:flex-start;
            gap:10px; font-size:16px;
        }
        .option:hover:not(.disabled) { background:#2b2b33; border-color:#444456; }
        .option input[type="radio"] {
            accent-color:#d97706;
            width:17px; height:17px;
            margin-top:2px; flex-shrink:0;
            cursor:pointer;
        }
        .option.disabled { cursor:default; opacity:0.75; }
        .option.correct { border-color:#4caf50; background:rgba(76,175,80,0.12); color:#a7f3d0; }
        .option.wrong { border-color:#ef4444; background:rgba(239,68,68,0.12); color:#fca5a5; }

        .feedback-box {
            background:#1c1c24;
            border-left:4px solid #d97706;
            padding:14px 16px;
            border-radius:6px;
            margin-top:16px;
            display:none;
            font-size:16px;
            line-height:1.5;
            color:#d1d1d6;
        }
        .feedback-box .fb-title { font-weight:700; margin-bottom:4px; }
        .feedback-box .fb-title.correct { color:#4caf50; }
        .feedback-box .fb-title.wrong { color:#ef4444; }

        .nav-bottom {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-top:20px;
            flex-wrap:wrap;
        }
        .btn-nav {
            background:#222227; border:1px solid #2d2d38;
            color:#e4e4ed; padding:10px 22px;
            border-radius:6px; font-size:16px;
            cursor:pointer; transition:0.2s;
            font-family:'Cardo',Georgia,serif;
            font-weight:700;
        }
        .btn-nav:hover:not(:disabled) { background:#2d2d35; border-color:#555566; }
        .btn-nav:disabled { opacity:0.3; cursor:not-allowed; }
        .btn-primary {
            background:#d97706; border:none;
            color:#fff; padding:10px 28px;
            border-radius:6px; font-size:16px;
            font-weight:700; cursor:pointer;
            transition:0.2s;
            font-family:'Cardo',Georgia,serif;
        }
        .btn-primary:hover:not(:disabled) { background:#b45309; }
        .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

        .result-screen { display:none; text-align:center; padding:30px 10px; }
        .result-screen .score { font-size:48px; color:#d97706; font-weight:700; margin:10px 0; }
        .result-stats {
            display:flex; justify-content:center;
            gap:40px; font-size:18px;
            margin:15px 0 25px;
        }
        .result-stats span { font-weight:700; }
        .result-stats .correct { color:#4caf50; }
        .result-stats .wrong { color:#ef4444; }
        .result-list {
            max-width:600px; margin:0 auto;
            text-align:left;
            background:#1a1a24;
            padding:15px 20px;
            border-radius:8px;
            border:1px solid #2d2d38;
            max-height:300px;
            overflow-y:auto;
        }
        .result-list a {
            color:#d97706; text-decoration:none;
            display:block; padding:6px 0;
            border-bottom:1px solid #222;
        }
        .result-list a:hover { text-decoration:underline; }
        .btn-restart { margin-top:25px; }

        @media (max-width:600px) {
            .container { padding:12px; }
            .header h1 { font-size:18px; }
            .question-box .q-text { font-size:17px; }
            .option { font-size:15px; padding:10px 12px; }
            .btn-nav { padding:8px 16px; font-size:14px; }
            .nav-btn { width:28px; height:28px; font-size:11px; }
            .control-bar .counter { font-size:13px; }
            .feedback-box { font-size:15px; }
            .result-stats { gap:20px; font-size:16px; }
        }
        ::-webkit-scrollbar { width:0px; background:transparent; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚖️ Variações — Processo Civil II</h1>
        <div class="header-info">
            <div>60 questões complementares</div>
            <div><strong>DPC 0319</strong> — USP</div>
        </div>
    </div>

    <div class="nav-top" id="navTop"></div>

    <div class="control-bar">
        <span class="counter" id="qCounter">Questão 1 de 60</span>
        <div class="actions">
            <button class="btn-small mark-toggle" id="markBtn" onclick="toggleMark()">⭐ Marcar</button>
            <button class="btn-small shuffle" onclick="shuffleQuestions()">🔀 Embaralhar</button>
        </div>
    </div>

    <div id="questionArea">
        <div class="question-box">
            <div class="q-tema" id="qTema">Tema</div>
            <div class="q-text" id="qText">Carregando...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback-box" id="feedbackBox">
                <div class="fb-title" id="fbTitle">✅ Correto</div>
                <div id="fbText">Explicação...</div>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← Anterior</button>
        <button class="btn-primary" id="finalizarBtn" onclick="showResults()">Finalizar</button>
        <button class="btn-nav" id="nextBtn" onclick="navigate(1)">Próximo →</button>
    </div>

    <div class="result-screen" id="resultScreen">
        <h2 style="color:#fff;">Revisão concluída</h2>
        <div class="score" id="scorePct">0%</div>
        <div class="result-stats">
            <div><span class="correct" id="correctCount">0</span> acertos</div>
            <div><span class="wrong" id="wrongCount">0</span> erros</div>
            <div><span id="markedCount">0</span> ⭐ marcadas</div>
        </div>
        <div id="wrongList" class="result-list"></div>
        <button class="btn-primary btn-restart" onclick="location.reload()">🔁 Reiniciar simulado</button>
    </div>
</div>

<script>
// ============================================================
// 60 QUESTÕES COMPLEMENTARES – VARIAÇÕES E APROFUNDAMENTOS
// ============================================================
const questionsData = [
    // ====== TEMA 1: COISA JULGADA E EFICÁCIA (11 questões) ======
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q1: O que é a hipoteca judiciária e quando ela surge?", opcoes: [
        "É a garantia real que o réu deve oferecer para recorrer.",
        "É o gravame que se forma sobre os bens do devedor a partir da sentença condenatória transitada em julgado, independentemente de requerimento.",
        "É a penhora realizada pelo juiz antes da sentença.",
        "É a garantia que o autor deve prestar para ajuizar a ação."
    ], correta: 1, explicacao: "A hipoteca judiciária (art. 495, CPC) é efeito secundário da sentença condenatória, constituindo-se automaticamente sobre os bens do devedor para garantir a execução futura." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q2: A sentença que extingue o processo por ilegitimidade de parte faz coisa julgada material ou formal?", opcoes: [
        "Faz coisa julgada material, porque analisa a legitimidade.",
        "Faz coisa julgada formal, pois não julga o mérito; permite repropositura após correção do vício.",
        "Faz coisa julgada material, pois a ilegitimidade é questão de mérito.",
        "Não faz coisa julgada de nenhum tipo."
    ], correta: 1, explicacao: "Art. 485, VI c/c 486, §1º: extinção sem mérito gera coisa julgada formal, permitindo a repropositura após a correção." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q3: A ação rescisória (art. 966) tem prazo de 2 anos. Esse prazo é contado de que momento?", opcoes: [
        "Da data da sentença.",
        "Da data do trânsito em julgado da decisão que se quer rescindir.",
        "Da data da intimação da parte.",
        "Da data do registro da sentença."
    ], correta: 1, explicacao: "Art. 975: prazo decadencial de 2 anos contado do trânsito em julgado da última decisão proferida no processo." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q4: A querela nullitatis (art. 525, §1º, I) pode ser ajuizada a qualquer tempo? Em qual hipótese?", opcoes: [
        "Sim, para qualquer vício processual.",
        "Sim, para vício transrescisório, como a falta de citação válida do réu.",
        "Não, o prazo é de 2 anos, igual à rescisória.",
        "Não, apenas no prazo de 30 dias após a ciência."
    ], correta: 1, explicacao: "A querela nullitatis é cabível a qualquer tempo para nulidades absolutas (ex: falta de citação), pois o vício é transrescisório." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q5: Em uma ação de alimentos (relação de trato continuado), a sentença que fixa os alimentos transitou em julgado. O filho, que completou 24 anos, pode requerer a revisão? Como?", opcoes: [
        "Não, a coisa julgada impede qualquer alteração.",
        "Sim, por ação revisional (art. 505, I), com efeitos ex nunc, pois houve alteração do estado de fato.",
        "Sim, por ação rescisória, pois a decisão se tornou injusta.",
        "Não, apenas se houver acordo entre as partes."
    ], correta: 1, explicacao: "Nas relações continuativas, a alteração do estado de fato autoriza a ação revisional (art. 505, I), sem necessidade de rescisória." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q6: O que significa a 'função positiva da coisa julgada' (prejudicialidade)?", opcoes: [
        "Impede a propositura de nova ação idêntica.",
        "Impõe que o comando já transitado em julgado seja respeitado em outro processo dependente (ex: filiação → alimentos).",
        "Permite a execução da sentença.",
        "Autoriza a correção de erro material."
    ], correta: 1, explicacao: "Função positiva = a coisa julgada age como premissa inafastável em outro processo (prejudicialidade). Ex: decisão de filiação vincula a ação de alimentos." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q7: A coisa julgada material atinge os sucessores universais da parte (ex: herdeiros)?", opcoes: [
        "Não, pois não foram partes.",
        "Sim, porque sucedem a parte em todos os direitos e obrigações, inclusive processuais.",
        "Apenas se forem citados.",
        "Não, apenas os sucessores a título singular."
    ], correta: 1, explicacao: "Os sucessores universais (herdeiros) sucedem a parte na posição processual, ficando vinculados pela coisa julgada (art. 506, parágrafo único)." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q8: O que é a eficácia preclusiva da coisa julgada e qual o seu fundamento legal?", opcoes: [
        "Art. 508: consideram-se deduzidas e repelidas todas as alegações e defesas que a parte poderia ter oposto.",
        "Art. 505: a sentença pode ser revista por ação revisional.",
        "Art. 502: a coisa julgada torna imutável o dispositivo.",
        "Art. 503: a coisa julgada alcança as questões prejudiciais."
    ], correta: 0, explicacao: "Art. 508: eficácia preclusiva – vedação de reabrir a discussão com argumentos que já existiam e poderiam ter sido usados." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q9: A sentença arbitral faz coisa julgada? É possível ação rescisória?", opcoes: [
        "Sim, faz coisa julgada e cabe ação rescisória normalmente.",
        "Sim, faz coisa julgada, mas cabe ação anulatória (prazo de 90 dias) por defeitos de forma, não rescisória.",
        "Não, sentença arbitral não faz coisa julgada.",
        "Sim, mas o prazo para rescisória é de 1 ano."
    ], correta: 1, explicacao: "Lei de Arbitragem, art. 33: a sentença arbitral produz coisa julgada, mas a impugnação é por ação anulatória (90 dias), restrita a vícios formais graves." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q10: A tutela antecipada concedida em caráter antecedente (art. 304) se estabiliza. Essa estabilidade é coisa julgada?", opcoes: [
        "Sim, é coisa julgada material.",
        "Não, é estabilidade dos efeitos, não faz coisa julgada. Pode ser revista em ação própria no prazo de 2 anos.",
        "Sim, é coisa julgada formal.",
        "Não, a tutela perde eficácia automaticamente após 30 dias."
    ], correta: 1, explicacao: "Art. 304, §6º: a estabilidade não é coisa julgada. A parte pode ajuizar ação revisional em até 2 anos." },
    { tema: "Coisa Julgada e Eficácia", enunciado: "Q11: A relativização da coisa julgada (teoria defendida por Dinamarco) permite superar a coisa julgada em casos de injustiça extrema. Qual a principal crítica?", opcoes: [
        "É muito cara e demorada.",
        "Gera insegurança jurídica, pois a estabilidade das decisões é um pilar do sistema.",
        "Não há fundamento legal.",
        "A crítica é que a tese não tem apoio doutrinário."
    ], correta: 1, explicacao: "A relativização é criticada por enfraquecer a segurança jurídica, um dos pilares da coisa julgada." },

    // ====== TEMA 2: PROVA – APROFUNDAMENTOS (10 questões) ======
    { tema: "Prova – Aprofundamentos", enunciado: "Q12: A ata notarial (art. 384) é um meio de prova. Qual a sua principal característica?", opcoes: [
        "É um documento público que documenta fatos constatados pelo tabelião, com fé pública.",
        "É uma prova testemunhal reduzida a termo.",
        "É uma prova pericial feita por notário.",
        "É uma prova ilícita, pois viola a intimidade."
    ], correta: 0, explicacao: "A ata notarial (art. 384) é documento público que atesta fatos e circunstâncias verificados pelo tabelião, gozando de fé pública." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q13: O juiz pode indeferir a produção de prova pericial se a parte não apresentar quesitos?", opcoes: [
        "Sim, a ausência de quesitos torna a perícia inviável.",
        "Não, a perícia pode ser determinada de ofício e os quesitos são facultativos; o juiz pode formular os quesitos se necessário.",
        "Sim, apenas se a perícia for sobre direito.",
        "Não, a perícia é obrigatória sempre."
    ], correta: 1, explicacao: "Art. 465, §2º: os quesitos são facultativos; o juiz pode determinar a perícia mesmo sem quesitos." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q14: O que é a confissão ficta (art. 385) e em qual situação ela ocorre?", opcoes: [
        "Quando a parte confessa em cartório.",
        "Quando a parte, regularmente intimada para depoimento pessoal, não comparece ou se recusa a responder, presumindo-se verdadeiros os fatos contra ela alegados.",
        "Quando o réu não apresenta contestação.",
        "Quando o autor desiste da ação."
    ], correta: 1, explicacao: "Art. 385: a ausência injustificada ao depoimento pessoal gera a presunção (confissão ficta) de veracidade dos fatos alegados pela parte contrária." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q15: A inspeção judicial (art. 481) pode ser realizada em qualquer lugar, inclusive na residência da parte?", opcoes: [
        "Não, a residência é inviolável, salvo consentimento ou autorização judicial.",
        "Sim, a inspeção judicial pode ocorrer em qualquer lugar, independentemente de autorização.",
        "Não, a inspeção só pode ocorrer em lugares públicos.",
        "Sim, desde que a parte seja intimada."
    ], correta: 0, explicacao: "A inspeção judicial, em residência, exige consentimento do morador ou autorização judicial (art. 481, §1º), sob pena de ilicitude." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q16: A exibição de documento (art. 396) é um direito da parte ou um dever?", opcoes: [
        "É apenas um direito da parte, que pode ou não exibir.",
        "É um dever processual (Tema 1000 STJ), e a recusa autoriza medidas coercitivas para obtenção da prova.",
        "É um direito do réu, não do autor.",
        "É facultativo, a parte não sofre sanção por não exibir."
    ], correta: 1, explicacao: "STJ Tema 1000: a exibição de documentos é dever de cooperação, permitindo medidas coercitivas (art. 400, parágrafo único)." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q17: O assistente técnico indicado pela parte deve ser necessariamente um perito judicial?", opcoes: [
        "Sim, deve ser habilitado pelo juiz.",
        "Não, é um especialista escolhido pela parte para auxiliá-la, não precisa ser perito judicial.",
        "Sim, só pode atuar se for engenheiro.",
        "Não, mas deve ser nomeado pelo MP."
    ], correta: 1, explicacao: "Art. 465, §1º: o assistente técnico é indicado pela parte, não se confunde com o perito judicial." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q18: A prova emprestada é admitida no processo civil. Qual é o requisito essencial?", opcoes: [
        "Identidade de partes.",
        "Contraditório: a parte contra quem a prova é usada deve ter tido oportunidade de se manifestar no processo de origem.",
        "Autorização do juiz.",
        "Homologação do tribunal."
    ], correta: 1, explicacao: "STJ (EREsp 617.428): o requisito é o contraditório, não a identidade de partes." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q19: O que são 'provas atípicas' e qual o limite para sua admissão?", opcoes: [
        "São provas não previstas em lei, admitidas se moralmente legítimas (art. 369).",
        "São provas vedadas pelo CPC.",
        "São provas exclusivamente documentais.",
        "São provas produzidas apenas em segredo de justiça."
    ], correta: 0, explicacao: "Art. 369: admitem-se meios atípicos, desde que moralmente legítimos." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q20: A gravação ambiental feita por um dos interlocutores, sem o consentimento do outro, é, em regra, considerada:", opcoes: [
        "Ilícita, pois viola a intimidade.",
        "Lícita, pois o interlocutor é parte na conversa (Súmula 75 do STJ? – na verdade, jurisprudência consolidada).",
        "Ilícita, pois a gravação depende de autorização judicial.",
        "Lícita, apenas se for para provar crime."
    ], correta: 1, explicacao: "A jurisprudência do STJ e STF consolidou que a gravação ambiental por um dos interlocutores é lícita, pois não há quebra de sigilo das comunicações." },
    { tema: "Prova – Aprofundamentos", enunciado: "Q21: A presunção absoluta (iure et de iure) admite prova em contrário?", opcoes: [
        "Sim, sempre.",
        "Não, é uma ficção legal que não admite prova em contrário (ex: intenção de abandonar imóvel – CC, art. 1.276, §1º).",
        "Admite, se a prova for robusta.",
        "Admite apenas se for judicial."
    ], correta: 1, explicacao: "Presunção absoluta = não admite prova em contrário, operando como ficção legal." },

    // ====== TEMA 3: LITISCONSÓRCIO – CASOS ESPECÍFICOS (8 questões) ======

//  ESTADO E LÓGICA (idêntica à anterior)
// ============================================================
let questions = [];
let userAnswers = [];
let marked = [];
let currentIndex = 0;

function init() {
    questions = questionsData.map((q, idx) => ({ ...q, originalIndex: idx }));
    userAnswers = new Array(questions.length).fill(-1);
    marked = new Array(questions.length).fill(false);
    renderNav();
    renderQuestion();
    updateButtons();
}

function renderNav() {
    const nav = document.getElementById('navTop');
    nav.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.dataset.idx = i;
        btn.textContent = i + 1;
        if (i === currentIndex) btn.classList.add('active');
        if (userAnswers[i] !== -1) {
            const isCorrect = questions[i].correta === userAnswers[i];
            btn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
        }
        if (marked[i]) btn.classList.add('marked');
        btn.onclick = () => { goTo(i); };
        nav.appendChild(btn);
    }
}

function updateNav() {
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach((btn, idx) => {
        btn.classList.remove('active', 'answered-correct', 'answered-wrong', 'marked');
        if (idx === currentIndex) btn.classList.add('active');
        if (userAnswers[idx] !== -1) {
            const isCorrect = questions[idx].correta === userAnswers[idx];
            btn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
        }
        if (marked[idx]) btn.classList.add('marked');
    });
}

function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('qTema').textContent = '📌 ' + q.tema;
    document.getElementById('qText').textContent = q.enunciado;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const feedback = document.getElementById('feedbackBox');
    feedback.style.display = 'none';

    const markBtn = document.getElementById('markBtn');
    markBtn.textContent = marked[currentIndex] ? '⭐ Desmarcar' : '⭐ Marcar';
    markBtn.classList.toggle('active', marked[currentIndex]);

    q.opcoes.forEach((text, idx) => {
        const div = document.createElement('div');
        div.className = 'option';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'question';
        radio.value = idx;
        radio.disabled = (userAnswers[currentIndex] !== -1);
        if (userAnswers[currentIndex] === idx) radio.checked = true;
        radio.onchange = () => { selectOption(idx); };
        div.appendChild(radio);
        div.appendChild(document.createTextNode(' ' + text));
        container.appendChild(div);
    });

    if (userAnswers[currentIndex] !== -1) {
        showFeedback(currentIndex);
        const opts = container.querySelectorAll('.option');
        opts.forEach((el, idx) => {
            el.classList.add('disabled');
            const radio = el.querySelector('input');
            radio.disabled = true;
            if (idx === q.correta) el.classList.add('correct');
            if (idx === userAnswers[currentIndex] && idx !== q.correta) el.classList.add('wrong');
        });
    }

    document.getElementById('qCounter').textContent =
        'Questão ' + (currentIndex + 1) + ' de ' + questions.length;
    updateButtons();
}

function selectOption(idx) {
    if (userAnswers[currentIndex] !== -1) return;
    userAnswers[currentIndex] = idx;
    renderQuestion();
    showFeedback(currentIndex);
    updateNav();
}

function showFeedback(idx) {
    const q = questions[idx];
    const fb = document.getElementById('feedbackBox');
    const title = document.getElementById('fbTitle');
    const text = document.getElementById('fbText');
    const isCorrect = (userAnswers[idx] === q.correta);
    title.textContent = isCorrect ? '✅ Resposta correta!' : '❌ Resposta incorreta.';
    title.className = 'fb-title ' + (isCorrect ? 'correct' : 'wrong');
    text.textContent = q.explicacao;
    fb.style.display = 'block';
}

function goTo(idx) {
    if (idx < 0 || idx >= questions.length) return;
    currentIndex = idx;
    renderQuestion();
    updateNav();
    document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function navigate(delta) {
    const newIdx = currentIndex + delta;
    if (newIdx >= 0 && newIdx < questions.length) goTo(newIdx);
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = (currentIndex === 0);
    document.getElementById('nextBtn').disabled = (currentIndex === questions.length - 1);
}

function toggleMark() {
    marked[currentIndex] = !marked[currentIndex];
    renderQuestion();
    updateNav();
}

function shuffleQuestions() {
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    userAnswers = new Array(questions.length).fill(-1);
    marked = new Array(questions.length).fill(false);
    currentIndex = 0;
    renderNav();
    renderQuestion();
    updateButtons();
}

function showResults() {
    let correct = 0, wrong = 0, markedCount = 0;
    const wrongList = [];
    for (let i = 0; i < questions.length; i++) {
        if (userAnswers[i] !== -1) {
            if (userAnswers[i] === questions[i].correta) correct++;
            else { wrong++; wrongList.push(i); }
        } else {
            wrong++; wrongList.push(i);
        }
        if (marked[i]) markedCount++;
    }
    const total = questions.length;
    const pct = Math.round((correct / total) * 100);

    document.getElementById('scorePct').textContent = pct + '%';
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('markedCount').textContent = markedCount;

    const listDiv = document.getElementById('wrongList');
    listDiv.innerHTML = '';
    if (wrongList.length === 0) {
        listDiv.innerHTML = '<p style="color:#a7f3d0;">🎉 Parabéns! Você acertou todas!</p>';
    } else {
        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        ul.style.padding = '0';
        wrongList.forEach(idx => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = `Questão ${idx+1}: ${questions[idx].tema}`;
            a.onclick = (e) => {
                e.preventDefault();
                document.getElementById('resultScreen').style.display = 'none';
                document.getElementById('questionArea').style.display = 'block';
                goTo(idx);
            };
            li.appendChild(a);
            ul.appendChild(li);
        });
        listDiv.appendChild(ul);
    }

    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('navTop').style.display = 'none';
    document.querySelector('.control-bar').style.display = 'none';
    document.querySelector('.nav-bottom').style.display = 'none';
}

init();
</script>
</body>
</html>
